name: 국회토론회 일정 수집

on:
  # 매일 KST 08:00 자동 실행
  schedule:
    - cron: "0 23 * * *"

  # Power Automate 또는 수동 트리거
  workflow_dispatch:
    inputs:
      triggered_by:
        description: '트리거 출처'
        required: false
        default: 'manual'

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: 토론회 일정 조회
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GMAIL_USER:  ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:  ${{ secrets.GMAIL_PASS }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          TRIGGERED_BY: ${{ github.event.inputs.triggered_by || 'schedule' }}
        run: python fetch_forums.py

      - name: 변경 내역 저장
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_forums.json
          git diff --cached --quiet || git commit -m "chore: 토론회 목록 업데이트 $(date +'%Y-%m-%d')"
          git push
